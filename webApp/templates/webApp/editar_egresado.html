<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Egresado</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-primary { background: #0d47a1; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-secondary { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; text-decoration: none; margin-right: 10px; }
        .form-input { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        label { font-weight: bold; color: #333; font-size: 0.9rem; }
        h2 { color: #0d47a1; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✏️ Editando a: {{ egresado.nombres }} {{ egresado.apellidos }}</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Código Alumno (No editable)</label>
                    <input type="text" class="form-input" value="{{ egresado.codigo_alumno }}" disabled style="background: #e9ecef;">
                    <input type="hidden" name="codigo_alumno" value="{{ egresado.codigo_alumno }}">
                </div>
                <div><label>Teléfono</label><input type="text" name="telefono" class="form-input" value="{{ form.telefono.value|default:'' }}"></div>

                <div><label>Nombres</label><input type="text" name="nombres" class="form-input" value="{{ form.nombres.value|default:'' }}" required></div>
                <div><label>Apellidos</label><input type="text" name="apellidos" class="form-input" value="{{ form.apellidos.value|default:'' }}" required></div>
                
                <div style="grid-column: span 2;"><label>Email</label><input type="email" name="email" class="form-input" value="{{ form.email.value|default:'' }}" required></div>

                <div><label>Carrera</label><input type="text" name="carrera" class="form-input" value="{{ form.carrera.value|default:'' }}" required></div>
                <div><label>Año Egreso</label><input type="number" name="anio_egreso" class="form-input" value="{{ form.anio_egreso.value|default:'' }}" required></div>

                <div><label>Empresa Actual</label><input type="text" name="empresa_actual" class="form-input" value="{{ form.empresa_actual.value|default:'' }}"></div>
                <div><label>Cargo</label><input type="text" name="cargo" class="form-input" value="{{ form.cargo.value|default:'' }}"></div>
                
                <div style="grid-column: span 2;"><label>LinkedIn</label><input type="url" name="linkedin_url" class="form-input" value="{{ form.linkedin_url.value|default:'' }}"></div>
            </div>

            <div style="margin-top: 20px; text-align: right;">
                <a href="{% url 'registro_egresado' %}" class="btn-secondary">Cancelar</a>
                <button type="submit" class="btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</body>
</html>
